<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Doodle Classifier Pro</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
    
    <style>
    /* Import modern typography */
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');

    :root {
        --primary: #6366f1; /* Modern Indigo */
        --primary-hover: #4f46e5;
        --accent: #a855f7; /* Vibrant Purple */
        --text-main: #1e293b;
        --text-muted: #64748b;
        --glass-bg: rgba(255, 255, 255, 0.8);
    }

    body { 
        /* Subtle animated-feel gradient */
        background-color: #f8fafc;
        background-image: 
            radial-gradient(at 0% 0%, hsla(253,16%,70%,0.15) 0, transparent 50%), 
            radial-gradient(at 50% 0%, hsla(225,39%,80%,0.15) 0, transparent 50%), 
            radial-gradient(at 100% 0%, hsla(339,49%,80%,0.15) 0, transparent 50%);
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: var(--text-main);
        min-height: 100vh;
        margin: 0;
    }

    .header-section {
        padding: 4rem 0 2rem 0;
        text-align: center;
    }

    .header-section h1 {
        font-weight: 800;
        font-size: 3rem;
        letter-spacing: -0.05em;
        background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        margin-bottom: 0.5rem;
    }

    .main-card {
        background: var(--glass-bg);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.5);
        border-radius: 32px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
        padding: 3rem;
        margin-top: 1rem;
        transition: transform 0.3s ease;
    }

    .canvas-area {
        background: #fff;
        border: 2px solid #f1f5f9;
        border-radius: 20px;
        cursor: crosshair;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .canvas-area:hover { 
        border-color: var(--primary);
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.2);
        transform: translateY(-2px);
    }

    .btn-predict { 
        background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
        color: white;
        border: none; 
        padding: 1rem 2rem; 
        border-radius: 16px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 0.05em;
        transition: all 0.3s ease;
        box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.3);
    }

    .btn-predict:hover { 
        transform: translateY(-3px);
        box-shadow: 0 20px 25px -5px rgba(99, 102, 241, 0.4);
        filter: brightness(1.1);
    }

    #chartContainer { 
        height: 350px; 
        width: 100%; 
        border-radius: 20px;
    }

    .instruction-text { 
        font-size: 0.85rem; 
        color: var(--text-muted); 
        margin-top: 1.5rem;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.025em;
    }

    /* Additional polish for form controls */
    /* Refined Dropdown Styling */
    .form-select {
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        padding: 0.6rem 2.5rem 0.6rem 1rem; /* Added extra padding on the right (2.5rem) */
        font-weight: 600;
        color: #475569;
        background-color: #fff;
        min-width: 220px; /* Ensures the long "Recommended" text fits */
        cursor: pointer;
        appearance: none; /* Helps standardise the look across browsers */
        background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='%23343a40' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
        background-repeat: no-repeat;
        background-position: right 1rem center;
        background-size: 16px 12px;
    }

    .btn-outline-secondary {
        border-radius: 12px;
        border: 1px solid #e2e8f0;
        color: var(--text-muted);
    }
</style>

    <script>
        if (typeof module === 'object') {
            window.module = module;
            module = undefined;
        }
    </script>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="https://canvasjs.com/assets/script/canvasjs.min.js"></script>
    <script>
        if (window.module) module = window.module;
    </script>

    <script>
        function plot() {
            const canvas = document.getElementById("canvas");
            const ctx = canvas.getContext("2d");

            // Check if there's an error message
            const errorMsg = "{{ error_message }}";
            if (errorMsg) {
                document.getElementById("errorMessage").style.display = "block";
                document.getElementById("errorText").innerText = errorMsg;
                document.getElementById("chartWrapper").style.display = "none";
            } else {
                document.getElementById("errorMessage").style.display = "none";
                document.getElementById("chartWrapper").style.display = "block";
            }

            // Restore the drawing
            const image = new Image();
            image.onload = function() { ctx.drawImage(image, 0, 0); };
            image.src = "{{putback}}";

            // Set the dropdown
            document.getElementById("sel1").value = "{{net}}";

            // Only show chart if no error and we have prediction data
            {% if preds is defined and classes is defined %}
            if (!errorMsg) {
                const preds = {{ preds | safe }};
                const classes = {{ classes | safe }};
                
                let dataPoints = [];
                for (let i = 0; i < classes.length; i++) {
                    dataPoints.push({
                        y: parseFloat((preds[i] * 100).toFixed(2)), 
                        label: classes[i]
                    });
                }

                // Sort so highest probability is first
                dataPoints.sort((a, b) => b.y - a.y);

                const chart = new CanvasJS.Chart("chartContainer", {
                    animationEnabled: true,
                    theme: "light2",
                    title: { 
                        text: "Classification Results",
                        fontFamily: "Inter",
                        fontWeight: "lighter",
                        fontSize: 20
                    },
                    axisY: { title: "Confidence %", gridThickness: 0, maximum: 100 },
                    axisX: { labelFontSize: 12, interval: 1 },
                    data: [{
                        type: "bar",
                        indexLabel: "{y}%",
                        indexLabelPlacement: "outside",
                        color: "#4c51bf",
                        dataPoints: dataPoints.slice(0, 8)
                    }]
                });
                chart.render();
            }
            {% endif %}
        }
    </script>
</head>

<body>

<div class="container">
    <div class="header-section">
        <h1 class="fw-bold">Neural Sketch</h1>
        <p class="text-muted">Draw an item and let the deep learning model identify it.</p>
    </div>

    <div class="main-card">
        <form method='POST' onsubmit="return prepare()">
            <input type="hidden" id="payload" name="payload" value="x">
            
            <div class="row g-4">
                <div class="col-lg-5 text-center">
                    <div class="mb-3 d-flex justify-content-between align-items-center">
                        <select class="form-select w-50" name="net" id="sel1">
                            <option value="ConvNet">ConvNet (Recommended)</option>
                            <option value="MLP">MLP (Legacy)</option>
                        </select>
                        <div>
                            <button type="button" class="btn btn-outline-secondary btn-sm" id="clearButton">Clear</button>
                        </div>
                    </div>

                    <div class="mb-3">
                        <label for="strokeSize" class="form-label" style="font-weight: 600; color: var(--text-main);">Brush Size: <span id="sizeValue">10</span>px</label>
                        <input type="range" class="form-range" id="strokeSize" min="2" max="40" value="10" step="1">
                    </div>

                    <canvas id="canvas" width="280" height="280" class="canvas-area"></canvas>
                    <p class="instruction-text mt-2">Draw clearly inside the box</p>
                    
                    <button type="submit" class="btn btn-primary btn-predict w-100 mt-3" id="predict">Identify Drawing</button>
                </div>

                <div class="col-lg-7">
                    <div id="chartWrapper" style="display:none">
                        <div id="chartContainer"></div>
                    </div>
                    <div id="errorMessage" style="display:none" class="alert alert-warning alert-dismissible fade show" role="alert">
                        <strong>⚠️ Notice:</strong> <span id="errorText"></span>
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% if not chart %}
                    <div class="h-100 d-flex align-items-center justify-content-center border rounded-3 bg-light">
                        <p class="text-muted">Results will appear here after prediction</p>
                    </div>
                    {% endif %}
                </div>
            </div>
        </form>
    </div>
</div>

<script src="{{ url_for('static', filename='index.js') }}"></script>
<script>
    function prepare() {
        var canvasObj = document.getElementById("canvas");
        document.getElementById("payload").value = canvasObj.toDataURL();
        return true;
    }
    
    // Trigger plot if result exists
    {% if chart %}
        window.onload = plot;
    {% endif %}
</script>

</body>
</html>
